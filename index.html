<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title>Violent Incidents during Singapore's 1964 Racial Riots</title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/multi-style-layer.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/JulyIncidents_4.js"></script>
        <script src="data/SeptemberIncidents_5.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[1.270382944807244,103.8048366914106],[1.3389717078282914,103.93986246305968]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var title = new L.Control({'position':'topleft'});
        title.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };
        title.update = function () {
            this._div.innerHTML = '<h2>Violent Incidents during Singapore\'s 1964 Racial Riots</h2>';
        };
        title.addTo(map);
        var abstract = new L.Control({'position':'topright'});
        abstract.onAdd = function (map) {
            this._div = L.DomUtil.create('div',
            'leaflet-control abstract');
            this._div.id = 'abstract'
                this._div.setAttribute("onmouseenter", "abstract.show()");
                this._div.setAttribute("onmouseleave", "abstract.hide()");
                this.hide();
                return this._div;
            };
            abstract.hide = function () {
                this._div.classList.remove("abstractUncollapsed");
                this._div.classList.add("abstract");
                this._div.innerHTML = 'i'
            }
            abstract.show = function () {
                this._div.classList.remove("abstract");
                this._div.classList.add("abstractUncollapsed");
                this._div.innerHTML = 'This webmap displays the location of various violent incidents that occurred during Singapore\'s 1964 Racial Riots. The details of these incidents were extracted from contemporary Straits Times articles. <br /><br />For more details, please visit my GitHub (https://github.com/hhsheak).';
        };
        abstract.addTo(map);
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
            map.setMaxBounds(map.getBounds());
            map.setMinZoom(map.getZoom());
        }
        map.createPane('pane_GoogleRoad_0');
        map.getPane('pane_GoogleRoad_0').style.zIndex = 400;
        var layer_GoogleRoad_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleRoad_0',
            opacity: 1.0,
            attribution: '<a href="https://www.google.at/permissions/geoguidelines/attr-guide.html">Map data ©2015 Google</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        layer_GoogleRoad_0;
        map.addLayer(layer_GoogleRoad_0);
        map.createPane('pane_City_1');
        map.getPane('pane_City_1').style.zIndex = 401;
        var img_City_1 = 'data/City_1.png';
        var img_bounds_City_1 = [[1.2903495737941588,103.84204164999608],[1.3144896116269453,103.86743913983317]];
        var layer_City_1 = new L.imageOverlay(img_City_1,
                                              img_bounds_City_1,
                                              {pane: 'pane_City_1'});
        bounds_group.addLayer(layer_City_1);
        map.addLayer(layer_City_1);
        map.createPane('pane_Geylang_2');
        map.getPane('pane_Geylang_2').style.zIndex = 402;
        var img_Geylang_2 = 'data/Geylang_2.png';
        var img_bounds_Geylang_2 = [[1.2922515551815872,103.86691207391947],[1.3377343894971827,103.9173846265929]];
        var layer_Geylang_2 = new L.imageOverlay(img_Geylang_2,
                                              img_bounds_Geylang_2,
                                              {pane: 'pane_Geylang_2'});
        bounds_group.addLayer(layer_Geylang_2);
        map.addLayer(layer_Geylang_2);
        map.createPane('pane_TanjongPagar_3');
        map.getPane('pane_TanjongPagar_3').style.zIndex = 403;
        var img_TanjongPagar_3 = 'data/TanjongPagar_3.png';
        var img_bounds_TanjongPagar_3 = [[1.2678373898993183,103.84088267062599],[1.2912531788502692,103.8543378945703]];
        var layer_TanjongPagar_3 = new L.imageOverlay(img_TanjongPagar_3,
                                              img_bounds_TanjongPagar_3,
                                              {pane: 'pane_TanjongPagar_3'});
        bounds_group.addLayer(layer_TanjongPagar_3);
        map.addLayer(layer_TanjongPagar_3);
        function pop_JulyIncidents_4(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Date and Time</th>\
                        <td class="visible-with-data" id="Date and Time">' + (feature.properties['Date and Time'] !== null ? autolinker.link(String(feature.properties['Date and Time']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Location</th>\
                        <td class="visible-with-data" id="Location">' + (feature.properties['Location'] !== null ? autolinker.link(String(feature.properties['Location']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Description</th>\
                        <td class="visible-with-data" id="Description">' + (feature.properties['Description'] !== null ? autolinker.link(String(feature.properties['Description']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_JulyIncidents_4_0() {
            return {
                pane: 'pane_JulyIncidents_4',
                radius: 4.0,
                stroke: false,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,0,0,1.0)',
                interactive: true,
            }
        }
        function style_JulyIncidents_4_1() {
            return {
                pane: 'pane_JulyIncidents_4',
                radius: 12.0,
                stroke: false,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,0,0,0.30196078431372547)',
                interactive: true,
            }
        }
        map.createPane('pane_JulyIncidents_4');
        map.getPane('pane_JulyIncidents_4').style.zIndex = 404;
        map.getPane('pane_JulyIncidents_4').style['mix-blend-mode'] = 'normal';
        var layer_JulyIncidents_4 = new L.geoJson.multiStyle(json_JulyIncidents_4, {
            attribution: '',
            interactive: true,
            dataVar: 'json_JulyIncidents_4',
            layerName: 'layer_JulyIncidents_4',
            pane: 'pane_JulyIncidents_4',
            onEachFeature: pop_JulyIncidents_4,
            pointToLayers: [function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_JulyIncidents_4_0(feature));
            },function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_JulyIncidents_4_1(feature));
            },
        ]});
        bounds_group.addLayer(layer_JulyIncidents_4);
        map.addLayer(layer_JulyIncidents_4);
        function pop_SeptemberIncidents_5(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Date and Time</th>\
                        <td class="visible-with-data" id="Date and Time">' + (feature.properties['Date and Time'] !== null ? autolinker.link(String(feature.properties['Date and Time']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Location</th>\
                        <td class="visible-with-data" id="Location">' + (feature.properties['Location'] !== null ? autolinker.link(String(feature.properties['Location']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Description</th>\
                        <td class="visible-with-data" id="Description">' + (feature.properties['Description'] !== null ? autolinker.link(String(feature.properties['Description']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_SeptemberIncidents_5_0() {
            return {
                pane: 'pane_SeptemberIncidents_5',
                radius: 4.0,
                stroke: false,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,0,0,1.0)',
                interactive: true,
            }
        }
        function style_SeptemberIncidents_5_1() {
            return {
                pane: 'pane_SeptemberIncidents_5',
                radius: 12.0,
                stroke: false,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,0,0,0.30196078431372547)',
                interactive: true,
            }
        }
        map.createPane('pane_SeptemberIncidents_5');
        map.getPane('pane_SeptemberIncidents_5').style.zIndex = 405;
        map.getPane('pane_SeptemberIncidents_5').style['mix-blend-mode'] = 'normal';
        var layer_SeptemberIncidents_5 = new L.geoJson.multiStyle(json_SeptemberIncidents_5, {
            attribution: '',
            interactive: true,
            dataVar: 'json_SeptemberIncidents_5',
            layerName: 'layer_SeptemberIncidents_5',
            pane: 'pane_SeptemberIncidents_5',
            onEachFeature: pop_SeptemberIncidents_5,
            pointToLayers: [function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_SeptemberIncidents_5_0(feature));
            },function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_SeptemberIncidents_5_1(feature));
            },
        ]});
        bounds_group.addLayer(layer_SeptemberIncidents_5);
        map.addLayer(layer_SeptemberIncidents_5);
        var overlaysTree = [
            {label: '<img src="legend/SeptemberIncidents_5.png" /> September Incidents', layer: layer_SeptemberIncidents_5},
            {label: '<img src="legend/JulyIncidents_4.png" /> July Incidents', layer: layer_JulyIncidents_4},
            // I want these layers to remain permanent, so I commented them out of the filters list
            //{label: "Tanjong Pagar", layer: layer_TanjongPagar_3},
            //{label: "Geylang", layer: layer_Geylang_2},
            //{label: "City", layer: layer_City_1},
            //{label: "Google Road", layer: layer_GoogleRoad_0}
            ]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        L.ImageOverlay.include({
            getBounds: function () {
                return this._bounds;
            }
        });

        L.Control.MyControl = L.Control.extend({ // Creates the slider for opacity control
            onAdd: function(map) {
                var slider = L.DomUtil.create('div', 'opacity-control');

                slider.innerHTML = '<input type="range" min="0" max="1" value="1" step="0.1" class="slider" id="opacity">';
                slider.addEventListener('input', function(e) {
                    layer_City_1.setOpacity(e.target.value)
                    layer_Geylang_2.setOpacity(e.target.value)
                    layer_TanjongPagar_3.setOpacity(e.target.value)
                })
                
                L.DomEvent.disableClickPropagation(slider); // Stops clicks from hitting the map
                return slider;
            }
        });

        new L.Control.MyControl({ position: 'bottomleft' }).addTo(map);
        </script>        
    </body>
</html>
